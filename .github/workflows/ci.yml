# Generated by nybo init — extended per /nybo-verify Q002 (2026-04-28) with a `db` job.
name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      # Storybook's vitest-addon project runs play functions in headless
      # Chromium — install the browser before `npm run test`.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm run test
      - run: npm run build-storybook

  db:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      # Stub: confirms postgres:15 is reachable. Domain-model T4 onward will replace
      # this step with `npm run db:push` + integration tests once migrations exist.
      - name: Smoke-check postgres reachable
        run: |
          psql "$DATABASE_URL" -c '\dt' || true
          psql "$DATABASE_URL" -c 'SELECT version();'
