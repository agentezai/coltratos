  - id: disc-006
    title: Admin Review Queue
    description: >-
      Creates an internal queue for low-confidence analyses so admins can review
      edge cases and improve consistency of future verdicts.
    discoveryContext: >-
      Business outcome: Raise verdict quality toward the 85% requisito matching
      target by adding a human-in-the-loop quality control path.

      Who benefits: Platform admins and product operators monitoring model
      performance and user trust.

      Constraints & edge cases: Must surface low-confidence or conflicting
      requisito matches, preserve audit trails, and protect user privacy.

      Scope: In scope are queueing, review status, and feedback capture tied to
      Analisis; deferred are full annotation tooling and model retraining
      workflows.
    category: discovery
    priority: 6
    status: pending
