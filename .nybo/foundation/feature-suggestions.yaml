suggestions:
  - id: fs-001
    title: Authentication & session management
    description: Set up Supabase Auth for user login, registration, and session handling.
    discoveryContext: >-
      Business outcome: Secure access to a-saas-platform so only authorized
      users can interact with protected resources.

      Who benefits: All users who need to log in; admins who manage access
      control.

      Constraints & edge cases: Sessions should expire after inactivity.
      Password reset flow required. Consider brute-force protection and account
      lockout policy.

      Scope: Login, registration, session lifecycle, and password reset.
      Role-based permissions and OAuth providers are out of scope for this
      feature.
    category: suggested
    priority: 1
    status: pending
    createdAt: '2026-04-25T17:42:00.025Z'
    origin: scan
  - id: fs-002
    title: Database schema & migrations
    description: Define the initial schema for Supabase and set up a migration workflow.
    discoveryContext: >-
      Business outcome: Establish a stable, versioned data foundation that all
      other features build on.

      Who benefits: The entire development team — every feature depends on a
      correct schema.

      Constraints & edge cases: Migrations must be reversible. Avoid breaking
      changes to existing tables once data exists. Index columns used in
      frequent queries.

      Scope: Initial schema for core entities, migration tooling setup, and seed
      data for development. Data archival and multi-tenancy are out of scope.
    category: suggested
    priority: 2
    status: pending
    createdAt: '2026-04-25T17:42:00.025Z'
    origin: scan
  - id: fs-003
    title: Core UI layout & routing
    description: >-
      Scaffold the Next.js app shell: navigation, routing, and shared layout
      components.
    discoveryContext: >-
      Business outcome: Give users a navigable app structure so they can reach
      every section without dead ends.

      Who benefits: All users; sets the UX foundation every subsequent screen
      builds on.

      Constraints & edge cases: Protected routes must redirect unauthenticated
      users to login. Layout must be responsive for mobile and desktop.

      Scope: App shell, navigation, route definitions, and shared layout
      components (header, sidebar). Individual page content is out of scope
      here.
    category: suggested
    priority: 3
    status: pending
    createdAt: '2026-04-25T17:42:00.025Z'
    origin: scan
  - id: fs-004
    title: REST API layer with error handling
    description: >-
      Create the Node.js API foundation: route structure, middleware, and
      consistent error responses.
    discoveryContext: >-
      Business outcome: Provide a reliable, predictable API surface that
      frontend and external clients can depend on.

      Who benefits: Frontend developers and any future API consumers.

      Constraints & edge cases: All endpoints must return a consistent error
      shape. Auth middleware must be applied to protected routes. Rate limiting
      needed on public endpoints.

      Scope: Route structure, auth middleware, validation layer, and error
      response format. Business-logic endpoints for specific features are out of
      scope.
    category: suggested
    priority: 4
    status: pending
    createdAt: '2026-04-25T17:42:00.025Z'
    origin: scan
  - id: fs-005
    title: Usuario management
    description: >-
      Build CRUD operations for Usuario: A user account representing an empresa
      or procurement consultant with authentication and profile information.
    discoveryContext: >-
      Business outcome: Allow users to manage Usuario records so core workflows
      in a-saas-platform can function end to end.

      Who benefits: Users who create or interact with Usuario data as part of
      their primary workflow.

      Constraints & edge cases: Deletes should be soft where data history
      matters. List views need pagination. Access should be scoped by user role
      or ownership.

      Scope: Full CRUD for Usuario including list, detail, create, edit, and
      delete. Bulk operations and import/export are out of scope for this
      feature.
    category: suggested
    priority: 5
    status: pending
