# Supabase local development config — coltratos
# Hand-authored under project-bootstrap T3 (REQ-007). Run `supabase init` in a
# fresh checkout to regenerate this file with the latest CLI defaults; then
# re-apply the value overrides below to match this committed shape.

project_id = "coltratos"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
# Enabled per /nybo-verify Q001 (2026-04-28) — upload-flow spec will own the bucket layout.
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/**"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[edge_runtime]
enabled = true
inspector_port = 8083

[analytics]
enabled = false
