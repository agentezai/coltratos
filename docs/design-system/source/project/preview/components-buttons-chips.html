<!doctype html><html lang="es"><head><meta charset="utf-8"><title>Components · Buttons & chips</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:#fff;font-family:var(--font-sans);color:var(--fg-1)}
  h3{margin:0 0 12px;font-size:12px;font-weight:600;color:var(--fg-3);letter-spacing:.08em;text-transform:uppercase}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:24px}
  /* Button base */
  .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid transparent;transition:all 180ms cubic-bezier(.16,1,.3,1);line-height:1}
  .btn-primary{background:#2563eb;color:#fff}
  .btn-primary:hover{background:#1d4ed8}
  .btn-secondary{background:#fff;color:var(--graphite-800);border-color:var(--graphite-300)}
  .btn-secondary:hover{background:var(--graphite-100)}
  .btn-ghost{background:transparent;color:var(--graphite-700)}
  .btn-ghost:hover{background:var(--graphite-100)}
  .btn-danger{background:#fff;color:#b91c1c;border-color:#fecaca}
  .btn-success{background:#16a34a;color:#fff}
  .btn-sm{padding:7px 12px;font-size:13px}
  .btn-lg{padding:13px 22px;font-size:15px}
  /* Chips */
  .chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;font-family:inherit}
  .chip .dot{width:8px;height:8px;border-radius:999px}
  .chip-green{background:#ecfdf5;color:#15803d}.chip-green .dot{background:#22c55e}
  .chip-amber{background:#fffbeb;color:#b45309}.chip-amber .dot{background:#f59e0b}
  .chip-red{background:#fef2f2;color:#b91c1c}.chip-red .dot{background:#ef4444}
  .chip-blue{background:#eff6ff;color:#1d4ed8}.chip-blue .dot{background:#2563eb}
  .chip-violet{background:#ece9fe;color:#6d28d9}.chip-violet .dot{background:#7c3aed}
  .chip-gray{background:#f1f5f9;color:#475569}.chip-gray .dot{background:#64748b}
  svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style></head>
<body>
  <h3>Botones</h3>
  <div class="row">
    <button class="btn btn-primary"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Subir pliego</button>
    <button class="btn btn-secondary">Ver detalles</button>
    <button class="btn btn-ghost">Cancelar</button>
    <button class="btn btn-success"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>Confirmar</button>
    <button class="btn btn-danger">Eliminar</button>
  </div>
  <h3>Tamaños</h3>
  <div class="row">
    <button class="btn btn-primary btn-sm">Pequeño</button>
    <button class="btn btn-primary">Por defecto</button>
    <button class="btn btn-primary btn-lg">Grande · CTA</button>
  </div>
  <h3>Chips de estado · semáforo</h3>
  <div class="row">
    <span class="chip chip-green"><span class="dot"></span>Elegible</span>
    <span class="chip chip-amber"><span class="dot"></span>Observaciones</span>
    <span class="chip chip-red"><span class="dot"></span>No elegible</span>
    <span class="chip chip-blue"><span class="dot"></span>En proceso</span>
    <span class="chip chip-violet"><span class="dot"></span>IA validando</span>
    <span class="chip chip-gray"><span class="dot"></span>Borrador</span>
  </div>
</body></html>
