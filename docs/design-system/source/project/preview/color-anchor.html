<!doctype html><html lang="es"><head><meta charset="utf-8"><title>Color · Anchor</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;font-family:var(--font-sans);background:#fff;color:var(--fg-1)}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .sw{height:72px;border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;color:#fff;font-size:11px;line-height:1.2;box-shadow:var(--shadow-xs)}
  .sw b{font-weight:600;display:block;letter-spacing:.02em}
  .sw code{font-family:var(--font-mono);font-size:10px;opacity:.85}
  .light{color:var(--fg-1)}
  .hdr{font-size:12px;font-weight:600;color:var(--fg-3);text-transform:uppercase;letter-spacing:.08em;margin:0 0 10px}
</style></head>
<body>
  <p class="hdr">Navy · anchor</p>
  <div class="row" style="grid-template-columns:repeat(6,1fr);margin-bottom:14px">
    <div class="sw" style="background:#060f24"><b>navy-950</b><code>#060f24</code></div>
    <div class="sw" style="background:#0b1a3a"><b>navy-900</b><code>#0b1a3a</code></div>
    <div class="sw" style="background:#102448"><b>navy-800</b><code>#102448</code></div>
    <div class="sw" style="background:#1a2f5c"><b>navy-700</b><code>#1a2f5c</code></div>
    <div class="sw" style="background:#2a4075"><b>navy-600</b><code>#2a4075</code></div>
    <div class="sw" style="background:#3a5590"><b>navy-500</b><code>#3a5590</code></div>
  </div>
  <p class="hdr">Graphite · neutral ramp</p>
  <div class="row">
    <div class="sw" style="background:#0f172a"><b>graphite-900</b><code>#0f172a</code></div>
    <div class="sw" style="background:#334155"><b>graphite-700</b><code>#334155</code></div>
    <div class="sw" style="background:#64748b"><b>graphite-500</b><code>#64748b</code></div>
    <div class="sw light" style="background:#cbd5e1"><b>graphite-300</b><code>#cbd5e1</code></div>
    <div class="sw light" style="background:#e2e8f0"><b>graphite-200</b><code>#e2e8f0</code></div>
    <div class="sw light" style="background:#f8fafc"><b>graphite-50</b><code>#f8fafc</code></div>
  </div>
</body></html>
