<!doctype html><html lang="es"><head><meta charset="utf-8"><title>Spacing · Radii · Shadow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--surface-canvas);font-family:var(--font-sans);color:var(--fg-1)}
  .panel{background:#fff;border-radius:14px;padding:22px;box-shadow:var(--shadow-sm);margin-bottom:18px;border:1px solid var(--border-hairline)}
  h3{margin:0 0 14px;font-size:14px;font-weight:600;color:var(--fg-3);letter-spacing:.04em;text-transform:uppercase}
  .stack{display:flex;align-items:flex-end;gap:10px}
  .bar{background:#dbeafe;border:1px solid #bfdbfe;border-radius:6px;color:#1d4ed8;font-family:var(--font-mono);font-size:11px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;height:80px}
  .b1{width:4px}.b2{width:8px}.b3{width:12px}.b4{width:16px}.b5{width:20px}.b6{width:24px}.b8{width:32px}.b10{width:40px}.b12{width:48px}.b16{width:64px}
  .radii{display:grid;grid-template-columns:repeat(6,1fr);gap:14px}
  .rad{background:#fff;border:1px solid var(--border-subtle);height:96px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;color:var(--fg-2);box-shadow:var(--shadow-xs)}
  .shadows{display:grid;grid-template-columns:repeat(5,1fr);gap:18px;background:var(--surface-canvas);padding:24px;border-radius:14px}
  .sh{background:#fff;height:96px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;color:var(--fg-3)}
</style></head>
<body>
  <div class="panel">
    <h3>Spacing · 4-pt scale</h3>
    <div class="stack">
      <div class="bar b1">4</div><div class="bar b2">8</div><div class="bar b3">12</div>
      <div class="bar b4">16</div><div class="bar b5">20</div><div class="bar b6">24</div>
      <div class="bar b8">32</div><div class="bar b10">40</div><div class="bar b12">48</div><div class="bar b16">64</div>
    </div>
  </div>
  <div class="panel">
    <h3>Radii</h3>
    <div class="radii">
      <div class="rad" style="border-radius:4px">xs · 4</div>
      <div class="rad" style="border-radius:6px">sm · 6</div>
      <div class="rad" style="border-radius:8px">md · 8</div>
      <div class="rad" style="border-radius:12px">lg · 12 (card)</div>
      <div class="rad" style="border-radius:16px">xl · 16 (modal)</div>
      <div class="rad" style="border-radius:999px">pill · 999</div>
    </div>
  </div>
  <div class="panel">
    <h3>Shadow elevation</h3>
    <div class="shadows">
      <div class="sh" style="box-shadow:var(--shadow-xs)">xs</div>
      <div class="sh" style="box-shadow:var(--shadow-sm)">sm · default</div>
      <div class="sh" style="box-shadow:var(--shadow-md)">md · popover</div>
      <div class="sh" style="box-shadow:var(--shadow-lg)">lg · modal</div>
      <div class="sh" style="box-shadow:var(--shadow-xl)">xl · hero</div>
    </div>
  </div>
</body></html>
