<!doctype html><html lang="es"><head><meta charset="utf-8"><title>Brand · Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:0;font-family:var(--font-sans);color:var(--fg-1)}
  .row{display:grid;grid-template-columns:1fr 1fr}
  .panel{padding:42px;display:flex;align-items:center;gap:18px;justify-content:center;min-height:200px}
  .light{background:#fff;border-bottom:1px solid var(--border-hairline)}
  .dark{background:#0b1a3a;color:#fff;border-bottom:1px solid var(--navy-700)}
  .word{font-family:var(--font-display);font-size:34px;font-weight:800;letter-spacing:.06em}
  .meta{padding:18px 24px;font-size:12px;color:var(--fg-3);background:var(--surface-canvas);display:flex;justify-content:space-between}
  .meta b{color:var(--fg-1);font-weight:600}
</style></head>
<body>
  <div class="row">
    <div class="panel light">
      <img src="../assets/logo/coltratos-mark.svg" width="64" height="64" alt="">
      <span class="word" style="color:#0b1a3a">COLTRATOS</span>
    </div>
    <div class="panel dark">
      <img src="../assets/logo/coltratos-mark.svg" width="64" height="64" alt="">
      <span class="word" style="color:#fff">COLTRATOS</span>
    </div>
  </div>
  <div class="meta">
    <span><b>Mark:</b> simple rounded “C”, gradient #4ade80 → #16a34a</span>
    <span><b>Wordmark:</b> Plus Jakarta Sans 800, +0.06em tracking</span>
    <span><b>Min size:</b> 24px mark · 96px lockup</span>
  </div>
</body></html>
